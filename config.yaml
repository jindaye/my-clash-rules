6|# ============ 基础 ============
7|mixed-port: 7890
8|allow-lan: true
9|bind-address: "*"
10|mode: rule
11|log-level: info
12|ipv6: false
13|find-process-mode: strict
14|external-controller: :9090
15|secret: "123456"
16|
