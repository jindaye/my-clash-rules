124|  - name: "🚀 节点选择"
125|    type: select
126|    proxies:
127|      - "✅ 自动选择"
128|      - "⚖️ 负载均衡"
129|      - "⭕ 故障切换"
130|      - my-node-1  # 替换为你的节点名
