370|# ============ 规则 ============
371|rules:
372|  # ---- 内网 / 本地（最高优先级）----
373|  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
374|  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
375|  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
376|  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
377|  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
378|  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
379|  - RULE-SET,private,🏠 内网服务
380|  - RULE-SET,lancidr,🏠 内网服务
381|
382|  # ---- 广告拦截 ----
383|  - RULE-SET,my-reject,REJECT
384|
385|  # ---- Telegram ----
386|  - RULE-SET,telegramcidr,📲 电报消息
387|
388|  # ---- 谷歌 ----
389|  - DOMAIN-SUFFIX,gstatic.com,🧿 谷歌服务
390|  - RULE-SET,google,🧿 谷歌服务
391|
392|  # ---- 苹果 ----
393|  - RULE-SET,icloud,🍎 苹果同步
394|  - RULE-SET,apple,🍎 苹果服务
395|
396|  # ---- 常用软件 ----
397|  - RULE-SET,applications,📱 常用软件
398|
399|  # ---- 被墙（GFW）----
400|  - DOMAIN-SUFFIX,unmineable.com,🧱 一堵高墙
401|  - RULE-SET,gfw,🧱 一堵高墙
402|
403|  # ---- 境外 ----
404|  - RULE-SET,proxy,🌏 境外服务
405|  - RULE-SET,tld-not-cn,🌏 境外服务
406|
407|  # ---- 自定义直连 ----
408|  - DOMAIN-SUFFIX,jsdelivr.net,🇨🇳 国内直连
409|  - DOMAIN-SUFFIX,douyin.com,🇨🇳 国内直连
410|
411|  # ---- 国内 ----
412|  - RULE-SET,direct,🇨🇳 国内直连
